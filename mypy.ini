# Ferment Station — mypy type-checking configuration
[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True

# Strict on business logic modules
[mypy-common.data]
disallow_untyped_defs = True

[mypy-common.brassin_builder]
disallow_untyped_defs = True

[mypy-common.ramasse]
disallow_untyped_defs = True

[mypy-common.email]
disallow_untyped_defs = True

[mypy-core.optimizer.*]
disallow_untyped_defs = True

[mypy-db.conn]
disallow_untyped_defs = True

# EasyBeer API wrappers — return Any from _check_response()
[mypy-common.easybeer.*]
warn_return_any = False

# Relaxed on UI modules (NiceGUI dynamism)
[mypy-ui.*]
disallow_untyped_defs = False
