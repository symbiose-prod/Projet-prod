name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest tests/ -v --tb=short

      - name: Security audit (pip-audit)
        run: pip-audit --strict --desc on 2>&1 || true
        # Non-blocking for now — logs vulnerabilities without failing the build

  deploy-staging:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    concurrency:
      group: deploy-staging
      cancel-in-progress: true

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app-staging
            git fetch origin staging
            git checkout staging
            git pull origin staging
            sudo systemctl restart ferment-staging
            sleep 3
            if sudo systemctl is-active --quiet ferment-staging; then
              echo "✅ Staging deploy successful"
            else
              echo "❌ Staging deploy FAILED"
              sudo journalctl -u ferment-staging --no-pager -n 20
              exit 1
            fi

  deploy-production:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            sudo systemctl restart ferment
            sleep 3
            if sudo systemctl is-active --quiet ferment; then
              echo "✅ Production deploy successful"
            else
              echo "❌ Production deploy FAILED"
              sudo journalctl -u ferment --no-pager -n 20
              exit 1
            fi
