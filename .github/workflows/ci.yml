name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest tests/ -v --tb=short

      - name: Security audit (pip-audit)
        run: pip-audit --desc on || echo "::warning::pip-audit found vulnerabilities (non-blocking)"

  deploy-staging:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    concurrency:
      group: deploy-staging
      cancel-in-progress: true

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app-staging
            git fetch origin staging
            git checkout staging
            git pull origin staging
            sudo pip install --break-system-packages --ignore-installed -r requirements.txt
            sudo systemctl restart ferment-staging
            sleep 3
            if sudo systemctl is-active --quiet ferment-staging; then
              echo "✅ Staging deploy successful"
            else
              echo "❌ Staging deploy FAILED"
              sudo journalctl -u ferment-staging --no-pager -n 20
              exit 1
            fi

  deploy-production:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            # Installer les dépendances Python si requirements.txt a changé.
            # --ignore-installed : évite l'erreur "Cannot uninstall <pkg> RECORD file
            # not found" sur les packages installés par apt (debian).
            sudo pip install --break-system-packages --ignore-installed -r requirements.txt
            # ── Diagnostic : vérifier que python-barcode est importable ──
            echo "=== Python diagnostic ==="
            which python3
            python3 --version
            python3 -c "import sys; print('sys.path:'); [print('  ', p) for p in sys.path]"
            python3 -c "import barcode; print('✅ barcode imported from:', barcode.__file__)" \
              || echo "❌ barcode import FAILED"
            echo "=== ferment.service ==="
            sudo systemctl cat ferment 2>&1 | head -40
            echo "=== ferment process Python (si actif) ==="
            sudo systemctl status ferment --no-pager 2>&1 | head -20
            sudo systemctl stop ferment
            # Attendre que le port 8503 soit libéré (max 10s)
            for i in $(seq 1 10); do
              if ! sudo fuser 8503/tcp >/dev/null 2>&1; then break; fi
              sleep 1
            done
            sudo systemctl start ferment
            sleep 5
            for i in 1 2 3; do
              if sudo systemctl is-active --quiet ferment; then
                echo "✅ Production deploy successful"
                exit 0
              fi
              echo "⏳ Waiting for ferment to start (attempt $i/3)..."
              sleep 5
            done
            echo "❌ Production deploy FAILED"
            sudo journalctl -u ferment --no-pager -n 30
            exit 1
