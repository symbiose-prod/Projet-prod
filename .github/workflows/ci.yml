name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Ghostscript pour treepoem)
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      # Mypy : type checking. Non-bloquant pour l'instant (continue-on-error)
      # le temps de nettoyer les findings existants. À durcir dès qu'on a
      # rame.   À durcir = retirer `|| true` quand le baseline est clean.
      - name: Type check (mypy, non-blocking)
        run: mypy common/ db/ pages/ || echo "::warning::mypy found type issues (non-blocking — to clean progressively)"

      - name: Tests (pytest)
        run: pytest tests/ -v --tb=short

      - name: Security audit (pip-audit)
        run: pip-audit --desc on || echo "::warning::pip-audit found vulnerabilities (non-blocking)"

  deploy-staging:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    concurrency:
      group: deploy-staging
      cancel-in-progress: true

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app-staging
            git fetch origin staging
            git checkout staging
            git pull origin staging
            sudo apt-get install -y ghostscript
            sudo /home/ubuntu/app-staging/venv/bin/pip install -r requirements.txt
            sudo systemctl restart ferment-staging
            sleep 3
            if sudo systemctl is-active --quiet ferment-staging; then
              echo "✅ Staging deploy successful"
            else
              echo "❌ Staging deploy FAILED"
              sudo journalctl -u ferment-staging --no-pager -n 20
              exit 1
            fi

  deploy-production:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            # Ghostscript : requis par treepoem pour générer le GS1-128 via BWIPP
            sudo apt-get install -y ghostscript
            # Installer les dépendances Python dans le venv utilisé par ferment.service
            # (ExecStart=/home/ubuntu/app/venv/bin/python).
            sudo /home/ubuntu/app/venv/bin/pip install -r requirements.txt
            # Vérifier que treepoem (génération GS1-128) marche
            sudo /home/ubuntu/app/venv/bin/python -c "
            import treepoem
            img = treepoem.generate_barcode(barcode_type='gs1-128', data='(02)03770014427014(15)260901(10)KME27042026(37)126')
            print('✅ treepoem OK, barcode size:', img.size)
            " || (echo "❌ treepoem FAILED"; exit 1)
            # Vérifier que zxing-cpp (lecture côté scan) est importable
            sudo /home/ubuntu/app/venv/bin/python -c "
            import zxingcpp
            print('✅ zxing-cpp OK, version:', zxingcpp.__version__ if hasattr(zxingcpp, '__version__') else 'unknown')
            " || (echo "❌ zxing-cpp FAILED"; exit 1)
            # Appliquer les migrations DB (idempotent grâce aux IF NOT EXISTS)
            sudo cp /home/ubuntu/app/db/migrate.sql /tmp/migrate.sql
            sudo -u postgres psql -d "whole-tomato-leopard" -f /tmp/migrate.sql > /dev/null \
              && echo "✅ DB migrations OK" \
              || (echo "❌ DB migrations FAILED"; exit 1)
            sudo systemctl stop ferment
            # Attendre que le port 8503 soit libéré (max 10s)
            for i in $(seq 1 10); do
              if ! sudo fuser 8503/tcp >/dev/null 2>&1; then break; fi
              sleep 1
            done
            sudo systemctl start ferment
            sleep 5
            for i in 1 2 3; do
              if sudo systemctl is-active --quiet ferment; then
                echo "✅ Production deploy successful"
                exit 0
              fi
              echo "⏳ Waiting for ferment to start (attempt $i/3)..."
              sleep 5
            done
            echo "❌ Production deploy FAILED"
            sudo journalctl -u ferment --no-pager -n 30
            exit 1
