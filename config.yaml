data_files:
  main_table: "data/production.xlsx"   # table source
  flavor_map: "data/flavor_map.csv"    # mapping nom → goût canonique
images_dir: "assets"                   # dossier des visuels produit

# ─── Constantes métier ──────────────────────────────────────────────────────
business:

  # Pertes par type de cuve (litres) — transfert + embouteillage
  default_loss_large: 800    # cuve 7200L
  default_loss_small: 400    # cuve 5200L

  # DDM par défaut (jours)
  ddm_days: 365

  # Prix de référence pour le calcul de perte économique (€/hL)
  # Utilisé dans core/optimizer/planning.py pour le ranking des goûts
  price_ref_hl: 400.0

  # Nombre max de propositions sauvegardées par tenant
  max_slots: 6

  # Fenêtre de données par défaut (jours) — fallback si non détectée dans l'Excel
  default_window_days: 60

  # Configurations cuves
  tanks:
    "Cuve de 7200L (1 goût)":
      capacity: 7200
      transfer_loss: 400
      bottling_loss: 400
      nb_gouts: 1
      nominal_hL: 64.0
    "Cuve de 5200L (1 goût)":
      capacity: 5200
      transfer_loss: 200
      bottling_loss: 200
      nb_gouts: 1
      nominal_hL: 48.0

# ─── Stocks — Fournisseurs principaux ────────────────────────────────────────
stocks:
  # Ordre important pour les patterns : le plus spécifique en premier
  supplier_groups:
    # ── Contenants (bouteilles) ──
    - name: "Verallia"
      icon: "water_drop"
      category: "Contenants"
      patterns: ["EAU GAZEUSE"]         # 75cl eau gazeuse
      ordering:
        lead_time_days: 14              # délai de livraison : 2 semaines
        min_order_pallets: 10           # commande minimum 10 palettes
        pallets:
          "Bouteille 75cl EAU GAZEUSE - 0.75L":
            bottles_per_pallet: 1624

    - name: "Wiegand-glas"
      icon: "inventory_2"
      category: "Contenants"
      patterns: ["Bouteille"]           # 33cl + 75cl SAFT
      ordering:
        lead_time_days: 14              # délai de livraison : 2 semaines
        min_order_pallets: 26           # commande par camion complet
        can_split_references: true      # répartition libre entre références
        pallets:
          "Bouteille - 0.33L":
            bottles_per_pallet: 3610
          "Bouteille 75cl SAFT - 0.75L":
            bottles_per_pallet: 1421

    # ── Matières premières ──
    # Matching : mp_types + patterns en logique AND quand les deux sont
    # présents, ce qui évite les faux-positifs sans dépendre de l'ordre.
    - name: "Nature Favours"
      icon: "local_drink"
      category: "Matières premières"
      mp_types: ["INGREDIENT_FRUIT"]
      patterns: ["jus", "purée"]            # AND → exclut Figues / Sirop de figues (→ Actibio)
      ordering:
        lead_time_days: 7                   # 1 semaine
        min_order_pallets: 1
        can_split_references: true          # répartition libre entre tous les jus
        notes: "Commande minimum 40 bibs de 20 kg. Possible de répartir selon tous les jus."

    - name: "Cristalco"
      icon: "grain"
      category: "Matières premières"
      mp_types: ["INGREDIENT_SUCRE"]
      patterns: ["sucre"]                   # AND → exclut "Sirop de Yacon"
      ordering:
        lead_time_days: 21                  # 3 semaines
        min_order_pallets: 4
        notes: "Commande par 4 palettes de 900 kg chacune."
        pallets:
          "Sucre":
            bottles_per_pallet: 900

    - name: "Siroperie Meurens"
      icon: "local_cafe"
      category: "Matières premières"
      patterns: ["sirop de figue"]          # Sirop de figues — avant Actibio pour éviter collision
      ordering:
        lead_time_days: 14                  # 2 semaines
        min_order_pallets: 1
        notes: "Commande par palette de 1 tonne."
        pallets:
          "Sirop de figues":
            bottles_per_pallet: 1000

    - name: "Actibio"
      icon: "eco"
      category: "Matières premières"
      patterns: ["figue"]                   # Figues uniquement (Sirop déjà capté ci-dessus)
      ordering:
        lead_time_days: 21                  # 3 semaines
        min_order_pallets: 4
        notes: "Commande par 4 palettes de 800 kg chacune."
        pallets:
          "Figues":
            bottles_per_pallet: 800

    - name: "Nexira"
      icon: "science"
      category: "Matières premières"
      patterns: ["fibre"]                   # Fibre d'acacia Bio

    - name: "Yacon & Co"
      icon: "eco"
      category: "Matières premières"
      patterns: ["yacon"]                   # "Sirop de Yacon"

    - name: "Cailleau"
      icon: "spa"
      category: "Matières premières"
      mp_types: ["INGREDIENT_HERBE"]

    - name: "ROBERTET SA"
      icon: "science"
      category: "Matières premières"
      mp_types: ["INGREDIENT_AUTRE"]
      patterns: ["arome", "infusion"]       # AND avec mp_types → exclut "Fibre d'acacia"
      ordering:
        lead_time_days: 35                  # 5 semaines
        notes: "Commande par tranche de 50 kg."

    # ── Emballages ──
    - name: "ADESA"
      icon: "label"
      category: "Emballages"
      mp_types: ["CONDITIONNEMENT_ETIQUETTE"]

    - name: "Turquet"
      icon: "widgets"
      category: "Emballages"
      mp_types: ["CONDITIONNEMENT_CARTON"]

    - name: "AWK"
      icon: "circle"
      category: "Emballages"
      mp_types: ["CONDITIONNEMENT_CAPSULE"]
      ordering:
        lead_time_days: 42                  # 6 semaines
        notes: "Commande par tranche de 200 000 capsules."

  ungrouped_label: "Autres contenants"

# ─── Sécurité ─────────────────────────────────────────────────────────────────
security:
  min_password_length: 10

  # Lockout exponentiel : chaque palier prolonge la durée de blocage
  lockout_thresholds:
    - { failures: 5, seconds: 300 }     # 5 échecs  → 5 min
    - { failures: 10, seconds: 1800 }   # 10 échecs → 30 min
    - { failures: 15, seconds: 7200 }   # 15 échecs → 2 h
