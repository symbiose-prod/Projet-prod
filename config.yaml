data_files:
  main_table: "data/production.xlsx"   # table source
  flavor_map: "data/flavor_map.csv"    # mapping nom → goût canonique
images_dir: "assets"                   # dossier des visuels produit

# ─── Constantes métier ──────────────────────────────────────────────────────
business:

  # Pertes par type de cuve (litres) — transfert + embouteillage
  default_loss_large: 800    # cuve 7200L
  default_loss_small: 400    # cuve 5200L

  # DDM par défaut (jours)
  ddm_days: 365

  # Prix de référence pour le calcul de perte économique (€/hL)
  # Utilisé dans core/optimizer/planning.py pour le ranking des goûts
  price_ref_hl: 400.0

  # Nombre max de propositions sauvegardées par tenant
  max_slots: 6

  # Fenêtre de données par défaut (jours) — fallback si non détectée dans l'Excel
  default_window_days: 60

  # Configurations cuves
  tanks:
    "Cuve de 7200L (1 goût)":
      capacity: 7200
      transfer_loss: 400
      bottling_loss: 400
      nb_gouts: 1
      nominal_hL: 64.0
    "Cuve de 5200L (1 goût)":
      capacity: 5200
      transfer_loss: 200
      bottling_loss: 200
      nb_gouts: 1
      nominal_hL: 48.0

# ─── Stocks — Fournisseurs principaux ────────────────────────────────────────
stocks:
  # Ordre important pour les patterns : le plus spécifique en premier
  supplier_groups:
    # ── Contenants (bouteilles) ──
    - name: "Verallia"
      icon: "water_drop"
      category: "Contenants"
      patterns: ["EAU GAZEUSE"]         # 75cl eau gazeuse
      ordering:
        lead_time_days: 14
        min_order: 10
        can_split_references: true
        references:
          "Bouteille 75cl EAU GAZEUSE - 0.75L":
            qty_per_unit: 1624

    - name: "Wiegand-glas"
      icon: "inventory_2"
      category: "Contenants"
      patterns: ["Bouteille"]           # 33cl + 75cl SAFT
      ordering:
        lead_time_days: 14
        min_order: 26                   # camion complet
        can_split_references: true
        references:
          "Bouteille - 0.33L":
            qty_per_unit: 3610
          "Bouteille 75cl SAFT - 0.75L":
            qty_per_unit: 1421

    # ── Matières premières ──
    # Matching : mp_types + patterns en logique AND quand les deux sont
    # présents, ce qui évite les faux-positifs sans dépendre de l'ordre.
    - name: "Nature Favours"
      icon: "local_drink"
      category: "Matières premières"
      mp_types: ["INGREDIENT_FRUIT"]
      patterns: ["jus", "purée"]
      ordering:
        lead_time_days: 7
        min_order: 0
        can_split_references: true
        order_unit: "carton"
        qty_unit: "kg"
        notes: "Cartons de 20 kg. Répartition libre entre tous les jus."
        references:
          "Jus de Gingembre":
            qty_per_unit: 20
          "Jus de Pamplemousse (GRAPEFRUIT)":
            qty_per_unit: 20
          "Jus de Passion":
            qty_per_unit: 20
          "Jus de citron Jaune":
            qty_per_unit: 20
          "Jus de citron Vert":
            qty_per_unit: 20
          "Jus de Baie de Sureau":
            qty_per_unit: 20
          "Puree de Mangue":
            qty_per_unit: 20
          "Puree de peche":
            qty_per_unit: 20

    - name: "Cristalco"
      icon: "grain"
      category: "Matières premières"
      mp_types: ["INGREDIENT_SUCRE"]
      patterns: ["sucre"]
      ordering:
        lead_time_days: 10
        min_order: 4
        qty_unit: "kg"
        notes: "Commande par 4 palettes de 900 kg chacune."
        references:
          "Sucre":
            qty_per_unit: 900

    - name: "Siroperie Meurens"
      icon: "local_cafe"
      category: "Matières premières"
      patterns: ["sirop de figue"]
      ordering:
        lead_time_days: 10
        min_order: 40
        order_unit: "carton"
        qty_unit: "kg"
        notes: "Commande par 40 cartons de 25 kg."
        references:
          "Sirop de figues":
            qty_per_unit: 25

    - name: "Actibio"
      icon: "eco"
      category: "Matières premières"
      patterns: ["figue"]
      ordering:
        lead_time_days: 20
        min_order: 2
        qty_unit: "kg"
        notes: "Commande par 2 palettes de 800 kg chacune."
        references:
          "Figues":
            qty_per_unit: 800

    - name: "Nexira"
      icon: "science"
      category: "Matières premières"
      patterns: ["fibre"]
      active: false

    - name: "Yacon & Co"
      icon: "eco"
      category: "Matières premières"
      patterns: ["yacon"]
      active: false

    - name: "Cailleau"
      icon: "spa"
      category: "Matières premières"
      mp_types: ["INGREDIENT_HERBE"]
      ordering:
        lead_time_days: 10
        min_order: 0
        order_unit: "carton"
        qty_unit: "kg"
        notes: "Pas de minimum de commande."

    - name: "ROBERTET SA"
      icon: "science"
      category: "Matières premières"
      mp_types: ["INGREDIENT_AUTRE"]
      patterns: ["arome", "infusion"]
      ordering:
        lead_time_days: 42
        min_order: 50
        order_unit: "bidon"
        qty_unit: "kg"
        notes: "Commande par bidons de 25 kg."
        references:
          "AROME NATUREL DE PECHE 65%VOL":
            qty_per_unit: 25
          "INFUSION DE MELISSE 58%V":
            qty_per_unit: 25
          "INFUSION DE MENTHE POIVREE 60%V":
            qty_per_unit: 25
          "INFUSION MENTHE NANAH 75%V":
            qty_per_unit: 25

    # ── Emballages ──
    - name: "ADESA"
      icon: "label"
      category: "Emballages"
      mp_types: ["CONDITIONNEMENT_ETIQUETTE"]
      ordering:
        lead_time_days: 20
        can_split_references: true
        order_unit: "carton"
        qty_unit: "unités"
        references:
          "Étiquettes 33cl":
            qty_per_unit: 4500
            min_qty: 300000
          "Étiquettes 75cl":
            qty_per_unit: 3000
            min_qty: 200000

    - name: "Turquet"
      icon: "widgets"
      category: "Emballages"
      mp_types: ["CONDITIONNEMENT_CARTON"]
      ordering:
        lead_time_days: 20

    - name: "AWK"
      icon: "circle"
      category: "Emballages"
      mp_types: ["CONDITIONNEMENT_CAPSULE"]
      ordering:
        lead_time_days: 42
        min_order: 2
        order_unit: "palette"
        qty_unit: "capsules"
        notes: "Commande par 2 palettes de 100 000 capsules."
        references:
          "Capsules":
            qty_per_unit: 100000

  ungrouped_label: "Autres contenants"

# ─── Sécurité ─────────────────────────────────────────────────────────────────
security:
  min_password_length: 10

  # Lockout exponentiel : chaque palier prolonge la durée de blocage
  lockout_thresholds:
    - { failures: 5, seconds: 300 }     # 5 échecs  → 5 min
    - { failures: 10, seconds: 1800 }   # 10 échecs → 30 min
    - { failures: 15, seconds: 7200 }   # 15 échecs → 2 h
